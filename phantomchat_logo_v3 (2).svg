<circle cx="473" cy="208" r="1.5" fill="#9B7FFF" opacity="0.35"/>
<circle cx="479" cy="228" r="1"   fill="#00D4B4" opacity="0.25"/>
<circle cx="456" cy="134" r="1.5" fill="#9B7FFF" opacity="0.4"/>
<circle cx="447" cy="124" r="1"   fill="#00D4B4" opacity="0.3"/>

<!-- Left particles -->
<circle cx="221" cy="150" r="2"   fill="#9B7FFF" opacity="0.3"/>
<circle cx="213" cy="166" r="1.5" fill="#9B7FFF" opacity="0.22"/>
<circle cx="209" cy="184" r="1"   fill="#9B7FFF" opacity="0.18"/>

<!-- Top sparkles -->
<circle cx="318" cy="70" r="2"   fill="#a99bff" opacity="0.6"/>
<circle cx="340" cy="64" r="1.5" fill="#00D4B4" opacity="0.55"/>
<circle cx="362" cy="69" r="2.5" fill="#a99bff" opacity="0.45"/>
<circle cx="378" cy="62" r="1"   fill="#00D4B4" opacity="0.6"/>
<circle cx="303" cy="66" r="1.5" fill="#9B7FFF" opacity="0.5"/>
<path d="M390 68 L392 64 L394 68 L398 70 L394 72 L392 76 L390 72 L386 70 Z" fill="#00D4B4" opacity="0.5"/>
<path d="M292 72 L293.5 68 L295 72 L299 73.5 L295 75 L293.5 79 L292 75 L288 73.5 Z" fill="#a99bff" opacity="0.4"/>

<!-- Wordmark — fully centered as one unit -->
<text x="340" y="408"
      font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
      font-weight="800" font-size="46"
      text-anchor="middle"
      letter-spacing="-0.5">
  <tspan fill="white">Phantom</tspan><tspan fill="#00D4B4">Chat</tspan>
</text>

<!-- Separator line -->
<line x1="190" y1="416" x2="490" y2="416" stroke="url(#sparkGrad)" stroke-width="0.75" opacity="0.28"/>

<!-- Tagline -->
<text x="340" y="444"
      font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
      font-weight="400" font-size="11.5"
      fill="#6B5BA0" letter-spacing="3.5"
      text-anchor="middle">SPEAK WITHOUT A FACE</text>
</svg>
