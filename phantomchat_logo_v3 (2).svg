<svg width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="ghostGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#9B7FFF"/>
    <stop offset="50%" stop-color="#6B3FF0"/>
    <stop offset="100%" stop-color="#00D4B4"/>
  </linearGradient>
  <linearGradient id="ghostGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#7B5CE0" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#00C4A4" stop-opacity="0.15"/>
  </linearGradient>
  <linearGradient id="eyeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#ffffff"/>
    <stop offset="100%" stop-color="#c4b8ff"/>
  </linearGradient>
  <linearGradient id="tailGrad" x1="100%" y1="0%" x2="0%" y2="0%">
    <stop offset="0%" stop-color="#7B5CE0" stop-opacity="0.7"/>
    <stop offset="100%" stop-color="#6B3FF0" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="sparkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#a99bff"/>
    <stop offset="100%" stop-color="#00D4B4"/>
  </linearGradient>
  <linearGradient id="bgGlow" x1="50%" y1="0%" x2="50%" y2="100%">
    <stop offset="0%" stop-color="#1a0840"/>
    <stop offset="100%" stop-color="#0a0a18"/>
  </linearGradient>
</defs>

<!-- Card background -->
<rect x="90" y="20" width="500" height="480" rx="32" fill="url(#bgGlow)"/>
<rect x="90" y="20" width="500" height="480" rx="32" fill="none" stroke="#2a1860" stroke-width="1"/>

<!-- Ambient glow -->
<ellipse cx="340" cy="210" rx="140" ry="115" fill="#2a1060" opacity="0.8"/>
<ellipse cx="340" cy="210" rx="95" ry="78" fill="#3a1880" opacity="0.5"/>

<!-- Dissolving tail wisps -->
<path d="M242 198 C215 184 188 188 168 180 C153 174 149 184 162 191 C176 199 198 196 212 208 C196 213 172 216 157 226 C144 234 150 246 164 242 C182 236 206 226 224 229" fill="none" stroke="url(#tailGrad)" stroke-width="11" stroke-linecap="round" opacity="0.5"/>
<path d="M240 233 C217 226 194 230 177 224 C164 220 162 230 174 236 C188 242 210 238 223 246" fill="none" stroke="url(#tailGrad)" stroke-width="7" stroke-linecap="round" opacity="0.3"/>
<path d="M237 258 C220 253 202 258 187 253 C176 249 175 258 185 263 C198 269 216 265 227 270" fill="none" stroke="url(#tailGrad)" stroke-width="4" stroke-linecap="round" opacity="0.18"/>

<!-- Ghost body -->
<path d="M340 82 C293 82 250 110 237 148 C225 184 227 228 234 260 C240 282 230 299 220 314 C212 327 220 340 232 332 C247 322 260 306 274 302 C285 298 297 308 310 316 C322 324 334 328 340 328 C346 328 358 324 370 316 C383 308 395 298 406 302 C420 306 433 322 448 332 C460 340 468 327 460 314 C450 299 440 282 446 260 C453 228 455 184 443 148 C430 110 387 82 340 82 Z" fill="url(#ghostGrad)" opacity="0.96"/>

