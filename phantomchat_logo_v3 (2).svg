<circle cx="368" cy="190" r="6" fill="white" opacity="0.12"/>
<path d="M358 182 C362 177 374 177 378 182" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.65"/>

<!-- Chat bubble tail -->
<path d="M352 322 L366 346 L378 322" fill="#00D4B4" opacity="0.75"/>

<!-- Ghost edge glow -->
<path d="M340 82 C293 82 250 110 237 148 C225 184 227 228 234 260 C240 282 230 299 220 314 C212 327 220 340 232 332 C247 322 260 306 274 302 C285 298 297 308 310 316 C322 324 334 328 340 328 C346 328 358 324 370 316 C383 308 395 298 406 302 C420 306 433 322 448 332 C460 340 468 327 460 314 C450 299 440 282 446 260 C453 228 455 184 443 148 C430 110 387 82 340 82 Z" fill="none" stroke="#00D4B4" stroke-width="1.5" opacity="0.45"/>

