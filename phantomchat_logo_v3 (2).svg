<!-- Left eye — hollow ethereal ring -->
<circle cx="312" cy="190" r="17" fill="none" stroke="url(#eyeGrad)" stroke-width="4" opacity="0.9"/>
<circle cx="312" cy="190" r="6" fill="white" opacity="0.12"/>
<path d="M302 182 C306 177 318 177 322 182" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.65"/>

<!-- Right eye — hollow ethereal ring -->
